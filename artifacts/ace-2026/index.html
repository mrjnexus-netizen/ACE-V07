<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080808" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- 2026-07-16 (SEO pass, per Reza) -- this is a client-side-rendered
       React SPA with no server-side rendering, so this static block is
       ALL that link-preview bots (WhatsApp, Twitter/X, Facebook,
       LinkedIn, Slack, etc.) and any crawler that doesn't execute
       JavaScript will ever see -- they never run the app's own JS, so
       they never see the per-locale title/description that SeoHead.tsx
       sets at runtime. This is deliberately the best single, English,
       always-true default. Googlebot itself DOES execute JS and will
       additionally pick up SeoHead's per-locale/per-visit updates on
       top of this baseline. -->
  <title>Amir Moslehi — Cinematic Composer for Film, Games & Animation</title>
  <meta name="description" content="Amir Moslehi is a cinematic composer scoring original music for film, games, and animation. Explore selected works, listen to the score, and get in touch about a project." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://www.amirmoslehi.com/" />

  <!-- Favicons. NOTE for Reza: these files need to actually exist in
       artifacts/ace-2026/public/ -- add real ones (any square PNG/ICO
       works to start; a proper favicon.ico + apple-touch-icon.png is
       the minimum). Until then browsers will silently fall back to a
       blank/default tab icon, which is harmless but not final. -->
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- Open Graph (WhatsApp / Facebook / LinkedIn / Slack link previews).
       NOTE for Reza: /og-image.jpg needs to actually exist in
       artifacts/ace-2026/public/ -- a real photo or a designed card,
       1200x630px is the standard safe size for every platform. -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Amir Moslehi" />
  <meta property="og:title" content="Amir Moslehi — Cinematic Composer for Film, Games & Animation" />
  <meta property="og:description" content="Original music for film, games, and animation. Explore selected works and listen to the score." />
  <meta property="og:url" content="https://www.amirmoslehi.com/" />
  <meta property="og:image" content="https://www.amirmoslehi.com/og-image.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter/X card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Amir Moslehi — Cinematic Composer for Film, Games & Animation" />
  <meta name="twitter:description" content="Original music for film, games, and animation. Explore selected works and listen to the score." />
  <meta name="twitter:image" content="https://www.amirmoslehi.com/og-image.jpg" />

  <!-- Structured data (Person schema) -- static baseline for crawlers
       that don't run JS; SeoHead.tsx refreshes/extends this once the
       real composer identity has loaded from the API. -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Amir Moslehi",
    "jobTitle": "Composer",
    "url": "https://www.amirmoslehi.com/",
    "sameAs": []
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@400;500;700&family=Lora:ital,wght@0,400;0,500;1,400&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      overflow-x: hidden;
      background-color: #080808;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    #root {
      width: 100%;
      min-height: 100dvh;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
